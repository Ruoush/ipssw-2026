<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AED Simulator — Training Unit</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .aed-device {
      max-width: 460px;
      width: 100%;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    .device-header {
      background: #1a1a1a;
      border: 2px solid #2a2a2a;
      border-radius: 8px;
      padding: 12px 18px;
      margin-bottom: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .device-brand { font-size: 13px; font-weight: 700; letter-spacing: 3px; color: #999; text-transform: uppercase; }
    .device-model { font-size: 11px; color: #444; margin-top: 2px; }

    .status-light {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #222;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .status-light.yellow { background: #e67e00; box-shadow: 0 0 10px #e67e00; }
    .status-light.red    { background: #e74c3c; box-shadow: 0 0 10px #e74c3c; animation: blink 0.7s infinite; }
    .status-light.green  { background: #2ecc71; box-shadow: 0 0 10px #2ecc71; }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.15; } }

    /* ── Screen ─────────────────────────────────────────────────── */
    .screen {
      background: #111;
      border: 3px solid #252525;
      border-radius: 12px;
      padding: 28px 22px 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 18px;
      position: relative;
    }

    /* Step dots */
    .step-indicator { display: flex; gap: 7px; justify-content: center; }
    .step-dot { width: 8px; height: 8px; border-radius: 50%; background: #2a2a2a; transition: all 0.3s; }
    .step-dot.active { background: #e67e00; box-shadow: 0 0 6px #e67e00; }
    .step-dot.done   { background: #3a3a3a; }

    /* Mute button */
    .btn-mute {
      position: absolute; top: 14px; right: 14px;
      background: transparent;
      border: 1px solid #2a2a2a;
      color: #444;
      border-radius: 6px;
      padding: 5px 9px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-mute:hover { color: #888; border-color: #555; }
    .btn-mute.muted { color: #e74c3c; border-color: #e74c3c; }

    /* ── Start Screen ───────────────────────────────────────────── */
    .start-screen {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 22px; flex: 1; text-align: center;
    }
    .aed-icon { font-size: 72px; }
    .start-title { font-size: 20px; font-weight: 700; letter-spacing: 3px; color: #888; text-transform: uppercase; }
    .start-subtitle { font-size: 13px; color: #444; }

    /* ── Step Screen ────────────────────────────────────────────── */
    .step-screen { display: none; flex-direction: column; gap: 18px; flex: 1; }

    .step-title {
      font-size: 26px; font-weight: 900;
      letter-spacing: 2px; text-align: center;
      text-transform: uppercase;
    }

    .step-instruction {
      font-size: 16px; line-height: 1.65;
      text-align: center; color: #bbb;
    }

    /* Pad diagram */
    .pad-diagram { display: none; justify-content: center; gap: 28px; }
    .pad-diagram.show { display: flex; }
    .pad-position { text-align: center; }
    .pad-box {
      width: 62px; height: 40px;
      border: 2px solid #e67e00;
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: #e67e00;
      margin: 0 auto 5px;
      font-weight: 700;
    }
    .pad-label { font-size: 10px; color: #666; line-height: 1.4; }

    /* Analyzing bar */
    .analyzing-bar { display: none; height: 4px; background: #1e1e1e; border-radius: 2px; overflow: hidden; }
    .analyzing-bar.show { display: block; }
    .analyzing-fill { height: 100%; width: 0%; background: #e67e00; border-radius: 2px; transition: width 4s linear; }

    /* ── CPR Section ────────────────────────────────────────────── */
    .cpr-section { display: none; flex-direction: column; align-items: center; gap: 14px; }

    .cpr-timer {
      font-size: 52px; font-weight: 900;
      font-variant-numeric: tabular-nums;
      color: #2ecc71;
    }

    .cpr-pulse {
      width: 74px; height: 74px;
      border-radius: 50%;
      background: #1a5c31;
      border: 3px solid #2ecc71;
    }
    .cpr-pulse.beat { animation: pulse-expand 0.12s ease-out; }
    @keyframes pulse-expand {
      0%   { transform: scale(1); background: #1a5c31; }
      50%  { transform: scale(1.32); background: #2ecc71; box-shadow: 0 0 24px #2ecc71; }
      100% { transform: scale(1); background: #1a5c31; }
    }

    .cpr-bpm-label { font-size: 12px; color: #555; letter-spacing: 1px; text-transform: uppercase; }
    .cpr-status { font-size: 13px; color: #666; min-height: 18px; }

    .cpr-controls { display: flex; gap: 8px; width: 100%; }

    /* ── Buttons ────────────────────────────────────────────────── */
    .btn-primary {
      background: #e67e00; color: white;
      border: none; border-radius: 8px;
      padding: 17px; font-size: 17px;
      font-weight: 700; letter-spacing: 1px;
      cursor: pointer; text-transform: uppercase;
      width: 100%;
      transition: background 0.2s, transform 0.1s;
      margin-top: auto;
    }
    .btn-primary:hover { background: #cf7200; }
    .btn-primary:active { transform: scale(0.98); }

    .btn-shock {
      background: #c0392b;
      animation: shock-glow 1.4s infinite;
    }
    .btn-shock:hover { background: #a93226; }
    @keyframes shock-glow {
      0%, 100% { box-shadow: 0 0 14px rgba(192,57,43,0.4); }
      50%       { box-shadow: 0 0 36px rgba(192,57,43,0.85); }
    }

    .btn-secondary {
      flex: 1; background: transparent;
      color: #555; border: 1px solid #2a2a2a;
      border-radius: 6px; padding: 10px;
      font-size: 13px; cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-secondary:hover { color: #aaa; border-color: #555; }

    /* ── Shock Overlay ──────────────────────────────────────────── */
    #shock-overlay {
      position: fixed; inset: 0;
      background: #c0392b;
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
    }
    #shock-overlay.active { animation: shock-flash 0.75s forwards; pointer-events: all; }
    @keyframes shock-flash {
      0%   { opacity: 0.95; }
      40%  { opacity: 0.85; }
      100% { opacity: 0; }
    }
    .shock-text {
      font-size: 32px; font-weight: 900;
      letter-spacing: 4px; color: white;
      text-align: center;
      text-shadow: 0 0 40px rgba(255,255,255,0.8);
    }
  </style>
</head>
<body>

<div class="aed-device">

  <div class="device-header">
    <div>
      <div class="device-brand">MedSim AED</div>
      <div class="device-model">Training Simulator v1.0</div>
    </div>
    <div class="status-light" id="statusLight"></div>
  </div>

  <div class="screen">
    <button class="btn-mute" id="muteBtn" onclick="toggleMute()">🔊 Sound</button>

    <div class="step-indicator" id="stepIndicator"></div>

    <!-- Start screen -->
    <div class="start-screen" id="startScreen">
      <div class="aed-icon">⚡</div>
      <div class="start-title">AED Simulator</div>
      <div class="start-subtitle">Medical Simulation Training Tool</div>
      <button class="btn-primary" style="margin-top: 10px;" onclick="startAED()">POWER ON</button>
    </div>

    <!-- Active step screen -->
    <div class="step-screen" id="stepScreen">
      <div class="step-title" id="stepTitle"></div>
      <div class="step-instruction" id="stepInstruction"></div>

      <div class="pad-diagram" id="padDiagram">
        <div class="pad-position">
          <div class="pad-box">PAD 1</div>
          <div class="pad-label">Below right<br>collarbone</div>
        </div>
        <div class="pad-position">
          <div class="pad-box">PAD 2</div>
          <div class="pad-label">Below left<br>armpit</div>
        </div>
      </div>

      <div class="analyzing-bar" id="analyzingBar">
        <div class="analyzing-fill" id="analyzingFill"></div>
      </div>

      <div class="cpr-section" id="cprSection">
        <div class="cpr-timer" id="cprTimer">2:00</div>
        <div class="cpr-pulse" id="cprPulse"></div>
        <div class="cpr-bpm-label">110 bpm · AHA guideline</div>
        <div class="cpr-status" id="cprStatus">Press Start CPR to begin</div>
        <div class="cpr-controls">
          <button class="btn-secondary" id="cprStartStop" onclick="toggleCPR()">▶ Start CPR</button>
          <button class="btn-secondary" onclick="resetCPR()">↺ Reset</button>
        </div>
      </div>

      <button class="btn-primary" id="actionBtn" onclick="handleAction()"></button>
    </div>

  </div>
</div>

<div id="shock-overlay">
  <div class="shock-text">⚡ SHOCK DELIVERED ⚡</div>
</div>

<script>
  // ── Steps ───────────────────────────────────────────────────────────────────
  const steps = [
    {
      id: 'power-on',
      title: 'POWER ON',
      instruction: 'Remove all clothing from the patient\'s chest. Send someone to call 911 immediately.',
      light: 'yellow',
      action: 'NEXT STEP ›',
      speech: 'A.E.D. powered on. Remove clothing from the patient\'s chest. Send someone to call 9-1-1 immediately.',
      showPads: false, isAnalyzing: false, isShock: false, isCPR: false
    },
    {
      id: 'attach-pads',
      title: 'ATTACH PADS',
      instruction: 'Attach electrode pads as shown in the diagram. Connect the cable to the AED.',
      light: 'yellow',
      action: 'PADS ATTACHED ›',
      speech: 'Attach the electrode pads as shown. Place pad one below the right collarbone, and pad two below the left armpit. Connect the cable to the A.E.D.',
      showPads: true, isAnalyzing: false, isShock: false, isCPR: false
    },
    {
      id: 'analyzing',
      title: 'ANALYZING RHYTHM',
      instruction: 'Stand clear. Do not touch the patient.',
      light: 'yellow',
      action: null,
      speech: 'Analyzing heart rhythm. Stand clear. Do not touch the patient.',
      showPads: false, isAnalyzing: true, isShock: false, isCPR: false
    },
    {
      id: 'shock-advised',
      title: 'SHOCK ADVISED',
      instruction: 'Shockable rhythm detected. Ensure nobody is touching the patient. Press DELIVER SHOCK when ready.',
      light: 'red',
      action: '⚡  DELIVER SHOCK',
      speech: 'Shock advised. Shockable rhythm detected. Ensure no one is touching the patient. Press the shock button when ready.',
      showPads: false, isAnalyzing: false, isShock: true, isCPR: false
    },
    {
      id: 'cpr',
      title: 'BEGIN CPR',
      instruction: 'Push hard and fast in the center of the chest. Allow full chest recoil between compressions.',
      light: 'green',
      action: '↺  START OVER',
      speech: 'Shock delivered. Begin C.P.R. immediately. Push hard and fast in the center of the chest. Allow the chest to fully rise between compressions.',
      showPads: false, isAnalyzing: false, isShock: false, isCPR: true
    }
  ];

  // ── State ───────────────────────────────────────────────────────────────────
  let current = -1;
  let muted = false;
  let cprRunning = false;
  let cprTick = null;
  let timerTick = null;
  let timerSecs = 120;
  let audioCtx = null;

  // ── Init ────────────────────────────────────────────────────────────────────
  (function init() {
    const ind = document.getElementById('stepIndicator');
    ind.innerHTML = steps.map((_, i) => `<div class="step-dot" id="dot${i}"></div>`).join('');
  })();

  function setDots(active) {
    steps.forEach((_, i) => {
      const d = document.getElementById('dot' + i);
      d.className = 'step-dot' + (i === active ? ' active' : i < active ? ' done' : '');
    });
  }

  // ── Speech ──────────────────────────────────────────────────────────────────
  function speak(text) {
    if (muted || !text || !window.speechSynthesis) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.88; u.pitch = 1.0;
    speechSynthesis.speak(u);
  }

  function toggleMute() {
    muted = !muted;
    const btn = document.getElementById('muteBtn');
    btn.textContent = muted ? '🔇 Muted' : '🔊 Sound';
    btn.classList.toggle('muted', muted);
    if (muted) speechSynthesis.cancel();
  }

  // ── Audio ───────────────────────────────────────────────────────────────────
  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function beep(freq = 880, dur = 0.07, vol = 0.25) {
    if (muted) return;
    try {
      const ctx = getCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(vol, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + dur);
    } catch(e) {}
  }

  function shockBeep() {
    if (muted) return;
    try {
      const ctx = getCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 180;
      gain.gain.setValueAtTime(0.9, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.55);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.55);
    } catch(e) {}
  }

  // ── CPR Metronome ───────────────────────────────────────────────────────────
  const BEAT_MS = Math.round(60000 / 110); // ~545ms @ 110 bpm

  function toggleCPR() {
    cprRunning ? stopCPR() : startCPR();
  }

  function startCPR() {
    cprRunning = true;
    document.getElementById('cprStartStop').textContent = '⏸ Stop CPR';
    document.getElementById('cprStatus').textContent = 'Push — release — push — release…';
    doBeat();
    cprTick = setInterval(doBeat, BEAT_MS);
    if (!timerTick) timerTick = setInterval(tickTimer, 1000);
  }

  function stopCPR() {
    cprRunning = false;
    clearInterval(cprTick); cprTick = null;
    document.getElementById('cprStartStop').textContent = '▶ Start CPR';
    document.getElementById('cprStatus').textContent = 'Paused';
  }

  function doBeat() {
    beep();
    const p = document.getElementById('cprPulse');
    p.classList.remove('beat');
    void p.offsetWidth; // force reflow
    p.classList.add('beat');
  }

  function tickTimer() {
    if (timerSecs <= 0) return;
    timerSecs--;
    renderTimer();
    if (timerSecs === 0) {
      clearInterval(timerTick); timerTick = null;
      if (cprRunning) stopCPR();
      document.getElementById('cprStatus').textContent = '2 minutes complete — re-analyze rhythm';
      speak('Two minutes of C.P.R. complete. Stop compressions and re-analyze the patient\'s heart rhythm.');
    }
  }

  function resetCPR() {
    if (cprRunning) stopCPR();
    clearInterval(timerTick); timerTick = null;
    timerSecs = 120;
    renderTimer();
    document.getElementById('cprStatus').textContent = 'Press Start CPR to begin';
    document.getElementById('cprStartStop').textContent = '▶ Start CPR';
  }

  function renderTimer() {
    const m = Math.floor(timerSecs / 60);
    const s = timerSecs % 60;
    document.getElementById('cprTimer').textContent = `${m}:${s.toString().padStart(2, '0')}`;
  }

  // ── Show Step ────────────────────────────────────────────────────────────────
  function showStep(i) {
    current = i;
    const step = steps[i];

    // Switch screens
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('stepScreen').style.display = 'flex';

    // Content
    document.getElementById('stepTitle').textContent = step.title;
    document.getElementById('stepInstruction').textContent = step.instruction;

    // Status light
    const light = document.getElementById('statusLight');
    light.className = 'status-light ' + step.light;

    // Step dots
    setDots(i);

    // Pad diagram
    document.getElementById('padDiagram').classList.toggle('show', step.showPads);

    // Analyzing bar
    const bar = document.getElementById('analyzingBar');
    const fill = document.getElementById('analyzingFill');
    if (step.isAnalyzing) {
      bar.classList.add('show');
      fill.style.transition = 'none';
      fill.style.width = '0%';
      setTimeout(() => { fill.style.transition = 'width 4s linear'; fill.style.width = '100%'; }, 30);
      setTimeout(() => showStep(i + 1), 4300);
    } else {
      bar.classList.remove('show');
    }

    // CPR section
    const cprSec = document.getElementById('cprSection');
    cprSec.style.display = step.isCPR ? 'flex' : 'none';
    if (!step.isCPR) resetCPR();

    // Action button
    const btn = document.getElementById('actionBtn');
    if (step.action) {
      btn.textContent = step.action;
      btn.style.display = 'block';
      btn.className = 'btn-primary' + (step.isShock ? ' btn-shock' : '');
    } else {
      btn.style.display = 'none';
    }

    // Speak
    speak(step.speech);
  }

  // ── Actions ─────────────────────────────────────────────────────────────────
  function startAED() { showStep(0); }

  function handleAction() {
    const step = steps[current];
    if (step.isShock) {
      deliverShock();
    } else if (step.isCPR) {
      // Start over
      resetCPR();
      document.getElementById('startScreen').style.display = 'flex';
      document.getElementById('stepScreen').style.display = 'none';
      document.getElementById('statusLight').className = 'status-light';
      setDots(-1);
      current = -1;
    } else if (!step.isAnalyzing) {
      showStep(current + 1);
    }
  }

  function deliverShock() {
    shockBeep();
    const overlay = document.getElementById('shock-overlay');
    overlay.classList.remove('active');
    void overlay.offsetWidth;
    overlay.classList.add('active');
    setTimeout(() => {
      overlay.classList.remove('active');
      showStep(current + 1);
    }, 850);
  }
</script>

</body>
</html>
